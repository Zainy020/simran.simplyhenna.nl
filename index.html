<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>100x Tekst</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #F7F1EB;
            color: #5C3A21;
            padding: 20px;
            line-height: 1.6;
            white-space: pre-wrap;
        }
    </style>
</head>
<body>
<script>
const tekst = "SIMRAN KANKER HANANE SRANSRA";
for (let i = 1; i <= 100000; i++) {
    document.write(`${i}. ${tekst}<br>`);
}
</script>
</body>
</html>
